<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password – Defect Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9973A;--gold2:#E8B84B;--dark:#0D0D14;--dark3:#1E1E2C;--card:#1A1A28;--border:#2C2C3E;--text:#E8E8F0;--muted:#888899;--danger:#E74C3C;--success:#2ECC71;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.wrap{width:100%;max-width:400px;}
.logos{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:1.5rem;}
.logos img{height:40px;object-fit:contain;border-radius:6px;}
.title{text-align:center;font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:var(--gold);margin-bottom:0.3rem;}
.sub{text-align:center;color:var(--muted);font-size:0.82rem;margin-bottom:1.5rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;border-top:3px solid var(--success);}
.form-group{margin-bottom:1.2rem;}
.form-group label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.4rem;}
.form-control{width:100%;background:var(--dark3);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:0.7rem 0.9rem;font-size:0.9rem;font-family:inherit;transition:border-color 0.2s;}
.form-control:focus{outline:none;border-color:var(--gold);}
.btn-block{width:100%;padding:0.8rem;border:none;border-radius:8px;background:var(--success);color:white;font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-top:0.3rem;}
.btn-block:hover{opacity:0.85;}
.link-back{text-align:center;margin-top:1rem;font-size:0.82rem;}
.link-back a{color:var(--gold);text-decoration:none;}
.link-back a:hover{text-decoration:underline;}
.alert{padding:0.7rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.85rem;border-left:3px solid;}
.alert-error{background:#2B0D0D;border-color:var(--danger);color:#FF9999;}
.alert-success{background:#0D2B1A;border-color:var(--success);color:#55E89A;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logos">
    <img src="{{ url_for('static', filename='logo_alsafy.jpeg') }}" alt="AlSafy">
    <img src="{{ url_for('static', filename='logo_xiaomi.jpeg') }}" alt="Xiaomi">
  </div>
  <div class="title">RESET PASSWORD</div>
  <div class="sub">Set a new password for your account</div>

  <div class="card">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat,msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Your Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" class="form-control" placeholder="At least 6 characters" required>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat new password" required>
      </div>
      <button type="submit" class="btn-block">🔒 Reset Password</button>
    </form>

    <div class="link-back"><a href="{{ url_for('login') }}">← Back to Login</a></div>
  </div>
</div>
</body>
</html>
